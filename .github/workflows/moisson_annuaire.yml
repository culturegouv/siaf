name: Moisson SIAF Annuaire

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  run-moisson:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run script
        run: python scripts/moissonsiaf_annuaire.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A data
          git status
          git commit -m "Mise à jour de l'annuaire SIAF" || echo "No changes"
          git push
