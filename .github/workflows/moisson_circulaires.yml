name: Moisson SIAF Circulaires

on:
  schedule:
    - cron: '30 02 1 * *'
  workflow_dispatch:

jobs:
  run-moisson:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run script
        run: python scripts/moissonsiaf_circulaires.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/*.csv
          git commit -m "Mise à jour des données SIAF" || echo "No changes"
          git push
